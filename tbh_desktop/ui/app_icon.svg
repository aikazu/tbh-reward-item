<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cba6f7"/>
      <stop offset="0.55" stop-color="#b4befe"/>
      <stop offset="1" stop-color="#89b4fa"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dde3ff"/>
      <stop offset="1" stop-color="#cdd6f4"/>
    </linearGradient>
  </defs>

  <!-- rounded app-icon background -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- soft inner shadow ring for depth -->
  <rect x="6" y="6" width="244" height="244" rx="52" ry="52"
        fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- bow loops -->
  <ellipse cx="110" cy="84" rx="22" ry="15" fill="url(#box)"/>
  <ellipse cx="146" cy="84" rx="22" ry="15" fill="url(#box)"/>
  <!-- bow knot -->
  <rect x="120" y="74" width="16" height="22" rx="5" fill="#181825"/>

  <!-- lid -->
  <rect x="70" y="94" width="116" height="32" rx="9" fill="url(#box)"/>
  <!-- body -->
  <rect x="80" y="118" width="96" height="74" rx="11" fill="url(#box)"/>

  <!-- vertical ribbon (crosses lid + body) -->
  <rect x="118" y="94" width="20" height="98" fill="#181825"/>
  <!-- lid seam shadow -->
  <rect x="70" y="124" width="116" height="3" fill="#181825" opacity="0.0"/>

  <!-- reward sparkle -->
  <path d="M200 38 l5.5 15 l15 5.5 l-15 5.5 l-5.5 15 l-5.5 -15 l-15 -5.5 l15 -5.5 z"
        fill="#f9e2af"/>
  <path d="M58 150 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3 z"
        fill="#f9e2af" opacity="0.85"/>
</svg>
