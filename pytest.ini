[pytest]
# Disable pytest-qt by default. Its qtbot fixture teardown hangs under
# QT_QPA_PLATFORM=offscreen on this Plasma Wayland setup, which kills the
# user's DE. Tests that need a real Qt event loop are marked @pytest.mark.gui
# and can be run explicitly with `pytest -m gui`. The `and not gui` here
# is what enforces that opt-in — without it, gui-marked tests run by
# default and crash the DE on CachyOS+Xe.
addopts = -m "not integration and not gui" -p no:pytestqt
testpaths = tests
